<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Poy Enterprises - Admin Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <form class="center-form card" id="login-form">
      <h1>Admin Login</h1>
      <input type="password" id="password" placeholder="Password" required autofocus />
      <button type="submit">Log in</button>
      <div id="error" class="status-msg err" style="display:none"></div>
    </form>
  </div>
  <script>
    document.getElementById("login-form").addEventListener("submit", async (e) => {
      e.preventDefault();
      const password = document.getElementById("password").value;
      const res = await fetch("/api/admin/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });
      if (res.ok) {
        window.location.href = "/admin.html";
        return;
      }
      const body = await res.json().catch(() => ({}));
      const errEl = document.getElementById("error");
      errEl.textContent = body.error || "Login failed.";
      errEl.style.display = "";
    });
  </script>
</body>
</html>
