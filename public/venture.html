<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Poy Enterprises - Venture</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700;750&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/webp;base64,UklGRkQAAABXRUJQVlA4TDcAAAAv/8F/AA/wiLFHvD8Cef4DD2oCpmHwb5oLOgwkov8TIPzvcXJMfsvvuL/inSLPw//4v9U53+P9AA==" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Toggle menu">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
  </button>
  <div class="sidebar-backdrop" id="sidebar-backdrop"></div>

  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-brand">
        <div class="brand-mark"><img src="data:image/webp;base64,UklGRkQAAABXRUJQVlA4TDcAAAAv/8F/AA/wiLFHvD8Cef4DD2oCpmHwb5oLOgwkov8TIPzvcXJMfsvvuL/inSLPw//4v9U53+P9AA==" alt="Poy Enterprises" /></div>
        <div class="sidebar-brand-text">
          <strong>Poy Enterprises</strong>
          <span>Admin Dashboard</span>
        </div>
      </div>

      <nav class="sidebar-nav">
        <div class="nav-category">
          <div class="nav-category-label">Bank</div>
          <a class="nav-link" href="/admin.html#overview">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/></svg>
            Overview
          </a>
          <a class="nav-link" href="/admin.html#clients">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
            Clients
          </a>
          <a class="nav-link" href="/admin.html#loans">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
            Loans
          </a>
          <a class="nav-link" href="/admin.html#withdrawals">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Withdrawals
          </a>
          <a class="nav-link" href="/admin.html#transactions">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 10h18M7 15h1M12 15h1"/><rect x="3" y="5" width="18" height="14" rx="2"/></svg>
            Transactions
          </a>
        </div>

        <div class="nav-category">
          <div class="nav-category-label">Beta - Owner Only</div>
          <a class="nav-link" href="/admin.html#market">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M18.7 8l-5.1 5.1-2.8-2.8L7 14"/></svg>
            Market
          </a>
          <a class="nav-link active" href="/admin.html#ventures">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 20h20"/><path d="M4 20V10l4-4 4 4v10"/><path d="M12 20V6l4-4 4 4v14"/></svg>
            Ventures
          </a>
        </div>

        <div class="nav-category">
          <div class="nav-category-label">Account</div>
          <a class="nav-link" href="/portal.html">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg>
            My Banking
          </a>
        </div>
      </nav>

      <div class="sidebar-footer">
        <div class="sidebar-user">
          <div class="sidebar-user-avatar" id="sidebar-avatar">?</div>
          <div style="min-width:0">
            <div class="sidebar-user-name" id="sidebar-username">Loading...</div>
            <div class="sidebar-user-role">Owner</div>
          </div>
        </div>
        <div class="icon-btn-group">
          <a class="icon-btn discord-link" href="https://discord.gg/d5WPJGQSD" target="_blank" rel="noopener noreferrer" title="Join our Discord">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1066c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.522 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
          </a>
          <span class="icon-btn-label">Our Discord</span>
        </div>
        <div class="icon-btn-group">
          <form method="POST" action="/auth/logout">
            <button class="icon-btn" type="submit" title="Log out">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
            </button>
          </form>
          <span class="icon-btn-label">Logout</span>
        </div>
      </div>
    </aside>

    <main class="main-content">
      <div id="loading">
        <div class="skeleton skeleton-row"></div>
        <div class="skeleton skeleton-row"></div>
      </div>

      <div id="content" style="display:none">
        <div class="content-header">
          <div>
            <a href="/admin.html#ventures" class="muted" style="font-size:0.85rem">&larr; Back to Ventures</a>
            <h1 id="venture-title" style="margin:8px 0 4px; word-break:break-word">Loading...</h1>
            <p class="muted" id="venture-meta" style="margin:0"></p>
          </div>
        </div>

        <div class="card" id="venture-not-found" style="display:none">
          <p class="muted">This idea doesn't exist or was deleted.</p>
        </div>

        <div id="venture-detail">
          <div class="card">
            <div id="venture-tags"></div>
            <img id="venture-image" class="venture-thumb" style="display:none" alt="" />
            <p id="venture-description" style="white-space:pre-wrap"></p>
            <div style="display:flex; gap:8px; margin-top:14px">
              <button class="secondary" id="venture-toggle-status">Mark Closed</button>
              <button class="secondary" id="venture-delete" style="color:var(--bad); border-color:var(--bad)">Delete</button>
            </div>
          </div>

          <div class="card">
            <h2>Thread</h2>
            <div id="venture-comments"></div>
            <form id="venture-comment-form" style="display:flex; gap:8px; margin-top:12px">
              <input type="text" id="venture-comment-input" placeholder="Reply in this thread..." maxlength="1000" style="flex:1" required />
              <button type="submit">Send</button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="/particles.js"></script>
  <script src="/venture.js"></script>
</body>
</html>
