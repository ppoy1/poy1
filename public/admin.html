<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Poy Enterprises - Admin Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700;750&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/webp;base64,UklGRkQAAABXRUJQVlA4TDcAAAAv/8F/AA/wiLFHvD8Cef4DD2oCpmHwb5oLOgwkov8TIPzvcXJMfsvvuL/inSLPw//4v9U53+P9AA==" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <header class="top">
      <div class="brand">
        <div class="brand-mark"><img src="data:image/webp;base64,UklGRkQAAABXRUJQVlA4TDcAAAAv/8F/AA/wiLFHvD8Cef4DD2oCpmHwb5oLOgwkov8TIPzvcXJMfsvvuL/inSLPw//4v9U53+P9AA==" alt="Poy Enterprises" /></div>
        <div>
          <h1>Admin Dashboard</h1>
          <div class="subtitle">Bank-wide overview</div>
        </div>
      </div>
      <form method="POST" action="/auth/logout"><button class="secondary" type="submit">Log out</button></form>
    </header>

    <div id="loading">
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
    </div>

    <div id="content" style="display:none">
      <div class="balance-grid">
        <div class="stat-card good">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></div>
          <h2>Total Deposits Held</h2>
          <div class="balance-amount">$<span id="total-deposits">0</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div>
          <h2>Total Loans Outstanding</h2>
          <div class="balance-amount">$<span id="total-loans">0</span></div>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 20h5v-2a4 4 0 0 0-3-3.87M9 20H4v-2a4 4 0 0 1 3-3.87m5-8.13a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"/></svg></div>
          <h2>Clients</h2>
          <div class="balance-amount"><span id="client-count">0</span></div>
        </div>
      </div>

      <div class="card">
        <h2>Clients</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>IGN</th><th>Deposit</th><th>Savings</th></tr></thead>
            <tbody id="clients-body"></tbody>
          </table>
        </div>
      </div>

      <div class="card">
        <h2>Loans</h2>
        <div class="table-wrap">
          <table>
            <thead><tr><th>Borrower</th><th>Principal</th><th>Weekly</th><th>Progress</th><th>Owed</th><th>Next payment</th></tr></thead>
            <tbody id="loans-body"></tbody>
          </table>
        </div>
      </div>

      <p class="muted" id="synced-at"></p>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
