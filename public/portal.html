<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Poy Enterprises - My Account</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;650;700;750&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/webp;base64,UklGRkQAAABXRUJQVlA4TDcAAAAv/8F/AA/wiLFHvD8Cef4DD2oCpmHwb5oLOgwkov8TIPzvcXJMfsvvuL/inSLPw//4v9U53+P9AA==" />
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <div class="page">
    <header class="top">
      <div class="brand">
        <div class="brand-mark"><img src="data:image/webp;base64,UklGRkQAAABXRUJQVlA4TDcAAAAv/8F/AA/wiLFHvD8Cef4DD2oCpmHwb5oLOgwkov8TIPzvcXJMfsvvuL/inSLPw//4v9U53+P9AA==" alt="Poy Enterprises" /></div>
        <div>
          <h1 id="greeting">Poy Enterprises</h1>
          <div class="subtitle">Client Portal</div>
        </div>
      </div>
      <form method="POST" action="/auth/logout"><button class="secondary" type="submit">Log out</button></form>
    </header>

    <div id="loading">
      <div class="skeleton skeleton-row"></div>
      <div class="skeleton skeleton-row"></div>
    </div>

    <div id="content" style="display:none">
      <div class="balance-grid">
        <div class="stat-card good">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="6" width="20" height="14" rx="2"/><path d="M2 10h20"/></svg></div>
          <h2>Deposit</h2>
          <div class="balance-amount">$<span id="deposit-balance">0</span></div>
          <form class="withdraw-form" id="withdraw-deposit-form">
            <input type="number" step="0.01" min="0.01" placeholder="Amount" id="withdraw-deposit-amount" required />
            <button type="submit">Withdraw</button>
          </form>
          <p class="field-hint">Instant - no approval needed.</p>
        </div>
        <div class="stat-card">
          <div class="stat-icon"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 12V8a2 2 0 0 0-2-2H4a2 2 0 0 0-2 2v8a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-1"/><path d="M18 12a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/><path d="M2 8h14"/></svg></div>
          <h2>Savings</h2>
          <div class="balance-amount">$<span id="savings-balance">0</span></div>
          <form class="withdraw-form" id="withdraw-savings-form">
            <input type="number" step="0.01" min="0.01" placeholder="Amount" id="withdraw-savings-amount" required />
            <button type="submit">Request</button>
          </form>
          <p class="field-hint">Needs the owner's approval - not instant.</p>
        </div>
      </div>

      <div class="card">
        <h2>Claim a Deposit</h2>
        <p class="muted" style="margin:0 0 4px">Already ran <code>/db pay into PoyEnterprises &lt;amount&gt;</code> in-game? Tell us where it goes.</p>
        <form class="withdraw-form" id="claim-form">
          <select id="claim-account-type">
            <option value="Deposit">Deposit</option>
            <option value="Savings">Savings</option>
            <option value="Loan">Loan repayment</option>
          </select>
          <button type="submit">Claim it</button>
        </form>
      </div>

      <div id="action-status"></div>

      <div class="card" id="loans-card" style="display:none">
        <h2>Loans</h2>
        <div class="table-wrap">
          <table>
            <thead>
              <tr><th>Principal</th><th>Weekly</th><th>Progress</th><th>Owed</th><th>Next payment</th></tr>
            </thead>
            <tbody id="loans-body"></tbody>
          </table>
        </div>
      </div>

      <p class="muted" id="synced-at"></p>
    </div>
  </div>

  <script src="/portal.js"></script>
</body>
</html>
