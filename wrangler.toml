name = "poybank-website"
compatibility_date = "2026-01-01"
pages_build_output_dir = "public"

# Filled in once you run: npx wrangler kv namespace create POYBANK_KV
[[kv_namespaces]]
binding = "POYBANK_KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"

# Non-secret config - safe to commit. Secrets (DISCORD_CLIENT_SECRET,
# SESSION_SECRET, WEBSITE_SYNC_SECRET, ADMIN_PASSWORD) are set separately via
# `npx wrangler pages secret put <NAME>` and never appear in this file.
[vars]
DISCORD_CLIENT_ID = "REPLACE_WITH_DISCORD_CLIENT_ID"
DISCORD_REDIRECT_URI = "https://REPLACE-WITH-YOUR-PROJECT.pages.dev/auth/discord/callback"
