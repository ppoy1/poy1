name = "poybank-website"
compatibility_date = "2026-01-01"
pages_build_output_dir = "public"

# KV namespace binding, secrets, and vars (DISCORD_CLIENT_ID,
# DISCORD_CLIENT_SECRET, DISCORD_REDIRECT_URI, SESSION_SECRET,
# WEBSITE_SYNC_SECRET, OWNER_DISCORD_ID) are all configured directly in the
# Cloudflare Pages dashboard (Settings -> Environment variables / Bindings),
# not here. Cloudflare reads this file during build, so putting placeholder
# values in a [[kv_namespaces]] or [vars] block here would override and break
# the real dashboard-configured values - keep this file build-config only.
